<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Batch Flow Scheduling Playground</title>
    <link rel="stylesheet" href="../resource-scheduling-site/shared.css" />
    <style>
      /* Domain-specific layout */
      main {
        max-width: 1180px;
        padding: 2rem 1.25rem 3rem;
      }
      
      .hero-layout {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1.4fr 0.8fr;
        align-items: start;
        margin-bottom: 1.5rem;
      }
      
      .hero-layout h1 {
        font-size: clamp(2.2rem, 6vw, 4.2rem);
        line-height: 0.95;
      }
      
      .grid-2 {
        margin-bottom: 1rem;
      }
      
      .panel h2 {
        margin: 0 0 0.9rem;
        font-size: 1.2rem;
      }
      
      .panel {
        padding: 1.15rem 1.2rem;
      }
      
      .docs-panel {
        margin-top: 1rem;
        padding: 0.95rem 1rem;
        border-radius: 16px;
        background: #fff;
        border: 1px solid var(--border);
      }
      
      .docs-panel h2 {
        margin: 0 0 0.45rem;
        font-size: 0.95rem;
        color: var(--ink);
      }
      
      .docs-list {
        margin: 0;
        padding-left: 1.2rem;
        color: var(--muted);
      }
      
      .docs-list li + li {
        margin-top: 0.3rem;
      }
      
      .docs-list a {
        color: var(--accent);
        text-decoration: none;
      }
      
      .sample-picker {
        display: grid;
        gap: 0.35rem;
        margin-top: 1rem;
      }
      
      .sample-picker label {
        color: var(--muted);
        font-size: 0.82rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      
      .sample-picker select {
        width: 100%;
        border-radius: var(--radius-sm);
      }
      
      .sample-description {
        margin-top: 0.85rem !important;
      }
      
      .status-card {
        padding: 1.25rem;
        background: var(--panel-strong);
      }
      
      .status-card h2 {
        margin: 0 0 0.6rem;
        font-size: 1.1rem;
      }
      
      @media (max-width: 900px) {
        .hero-layout,
        .metrics {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="sitebar">
      <div class="sitebar-inner">
        <a class="sitebar-brand" href="../">Resource Scheduling</a>
        <nav class="sitebar-nav" aria-label="Site navigation">
          <a href="../">All surfaces</a>
          <a href="../staffing/">Staffing</a>
        </nav>
      </div>
    </header>
    <main id="app"></main>
    <script type="module" src="./playground.js"></script>
  </body>
</html>
